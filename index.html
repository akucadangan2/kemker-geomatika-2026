<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMKER 2026 LOD1</title>
    
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #111; color: #eee; }
        
        #sidebar { width: 320px; background-color: #1a1a1a; display: flex; flex-direction: column; border-right: 1px solid #333; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .sidebar-header { background-color: #0055ff; padding: 20px; text-align: center; }
        .sidebar-header h1 { margin: 0; font-size: 22px; color: #fff; letter-spacing: 1px; }
        
        .sidebar-content { padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        .stat-box { background-color: #2a2a2a; border-radius: 8px; padding: 15px; margin-bottom: 20px; border-left: 4px solid #00ffcc; }
        .stat-box h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa; }
        .stat-box p { margin: 0; font-size: 24px; font-weight: bold; color: #00ffcc; }

        .control-group { background-color: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        
        .slider-container { display: flex; align-items: center; justify-content: space-between; }
        input[type=range] { flex-grow: 1; margin-right: 10px; cursor: pointer; }
        #height-value { font-weight: bold; color: #ffcc00; width: 40px; text-align: right; }

        .basemap-selector select { width: 100%; padding: 8px; background-color: #444; color: #fff; border: none; border-radius: 4px; cursor: pointer; }

        #feature-info { background-color: #222; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .data-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #444; padding: 8px 0; font-size: 13px; }
        .data-row:last-child { border-bottom: none; }
        .data-label { color: #aaa; }
        .data-value { color: #ffcc00; font-weight: bold; text-align: right; }
        .empty-state { text-align: center; color: #777; font-style: italic; font-size: 13px; }

        #map { flex-grow: 1; height: 100vh; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h1>KEMKER 2026 LOD1</h1>
        </div>
        <div class="sidebar-content">
            
            <div class="stat-box">
                <h3>Total Area Permukiman</h3>
                <p id="total-bangunan">Menghitung...</p>
            </div>

            <div class="control-group">
                <label>Atur Ketinggian LOD 1</label>
                <div class="slider-container">
                    <input type="range" id="height-slider" min="1" max="50" value="3" step="1">
                    <span id="height-value">3m</span>
                </div>
            </div>

            <div class="control-group basemap-selector">
                <label>Peta Dasar</label>
                <select id="basemap-select">
                    <option value="sat-layer">Satelit (Esri Imagery)</option>
                    <option value="dark-layer">Mode Gelap (Carto Dark)</option>
                    <option value="osm-layer">Peta Standar (OSM)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Detail Atribut Objek</label>
                <div id="feature-info">
                    <div class="empty-state">Klik poligon permukiman di peta untuk melihat data.</div>
                </div>
            </div>

            <!-- LEGEND AOI -->
            <div class="control-group">
                <label>Legend AOI (SIDODADI)</label>
                <div style="display: flex; flex-direction: column; gap: 12px; font-size: 13px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 24px; height: 24px; background-color: #ff0055; opacity: 0.08; border: 1px solid #ff0055; border-radius: 3px;"></div>
                        <span>Area AOI (Fill Transparan)</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 24px; height: 6px; background: linear-gradient(90deg, transparent, #ff0055, transparent); border-radius: 3px;"></div>
                        <span>Glow Effect (Neon)</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 24px; height: 3px; background: repeating-linear-gradient(90deg, #ffffff, #ffffff 4px, transparent 4px, transparent 8px);"></div>
                        <span>Batas AOI (Putih Putus-putus)</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script>
        const basemaps = {
            'osm-source': 'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'sat-source': 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            'dark-source': 'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
        };

        var map = new maplibregl.Map({
            container: 'map',
            style: {
                'version': 8,
                'sources': {
                    'osm-source': { 'type': 'raster', 'tiles': [basemaps['osm-source']], 'tileSize': 256 },
                    'sat-source': { 'type': 'raster', 'tiles': [basemaps['sat-source']], 'tileSize': 256 },
                    'dark-source': { 'type': 'raster', 'tiles': [basemaps['dark-source']], 'tileSize': 256 }
                },
                'layers': [
                    { 'id': 'osm-layer', 'type': 'raster', 'source': 'osm-source', 'layout': { 'visibility': 'none' } },
                    { 'id': 'sat-layer', 'type': 'raster', 'source': 'sat-source', 'layout': { 'visibility': 'visible' } },
                    { 'id': 'dark-layer', 'type': 'raster', 'source': 'dark-source', 'layout': { 'visibility': 'none' } }
                ]
            },
            center: [118.0, -2.5],
            zoom: 5,
            pitch: 60,
            bearing: -20,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        var currentGlobalHeight = 3; 

        map.on('load', function () {
            // Siapkan Sources
            map.addSource('aoi-data', { 'type': 'geojson', 'data': { type: 'FeatureCollection', features: [] } });
            map.addSource('permukiman-data', { 'type': 'geojson', 'data': { type: 'FeatureCollection', features: [] } });

            // Layer AOI
            map.addLayer({ id: 'aoi-fill', type: 'fill', source: 'aoi-data', paint: { 'fill-color': '#ff0055', 'fill-opacity': 0.05 }});
            map.addLayer({ id: 'aoi-glow', type: 'line', source: 'aoi-data', paint: { 'line-color': '#ff0055', 'line-width': 8, 'line-opacity': 0.4, 'line-blur': 4 }});
            map.addLayer({ id: 'aoi-line', type: 'line', source: 'aoi-data', paint: { 'line-color': '#ffffff', 'line-width': 2, 'line-dasharray': [4, 2] }});

            // Layer Permukiman 3D
            map.addLayer({
                'id': 'permukiman-3d',
                'type': 'fill-extrusion',
                'source': 'permukiman-data',
                'paint': {
                    'fill-extrusion-color': ['interpolate', ['linear'], ['get', 'SHAPE_Area'], 0, '#00ffcc', 2000, '#0055ff'],
                    'fill-extrusion-height': ['get', 'TINGGI'],
                    'fill-extrusion-base': 0,
                    'fill-extrusion-opacity': 0.85
                }
            });

            // Load Data
            fetch('./kirim/SIDODADI.geojson')
                .then(r => r.json())
                .then(data => map.getSource('aoi-data').setData(data))
                .catch(err => console.error("Error AOI:", err));

            fetch('./kirim/PERMUKIMAN_MERGE_CLEAN.geojson')
                .then(r => r.json())
                .then(data => {
                    map.getSource('permukiman-data').setData(data);
                    document.getElementById('total-bangunan').innerText = data.features.length + " Area";
                    map.fitBounds(turf.bbox(data), { padding: 50, pitch: 60 });
                })
                .catch(err => console.error("Error Permukiman:", err));

            // Event Listeners
            map.on('click', 'permukiman-3d', function (e) {
                if (e.features.length > 0) {
                    var props = e.features[0].properties;
                    var html = `
                        <div class="data-row"><span class="data-label">Luas Tapak</span><span class="data-value">${props.SHAPE_Area.toFixed(2)} m²</span></div>
                        <div class="data-row"><span class="data-label">Panjang Keliling</span><span class="data-value">${props.SHAPE_Leng.toFixed(2)} m</span></div>
                        <div class="data-row"><span class="data-label">Shape Length 1</span><span class="data-value">${props.Shape_Le_1.toFixed(2)}</span></div>
                        <div class="data-row"><span class="data-label">Tinggi Render</span><span class="data-value">${currentGlobalHeight} m</span></div>
                    `;
                    document.getElementById('feature-info').innerHTML = html;
                }
            });

            map.on('mouseenter', 'permukiman-3d', () => map.getCanvas().style.cursor = 'pointer');
            map.on('mouseleave', 'permukiman-3d', () => map.getCanvas().style.cursor = '');

            // Slider Height
            document.getElementById('height-slider').addEventListener('input', function (e) {
                currentGlobalHeight = parseInt(e.target.value);
                document.getElementById('height-value').innerText = currentGlobalHeight + "m";
                map.setPaintProperty('permukiman-3d', 'fill-extrusion-height', currentGlobalHeight);
            });

            // Basemap Switcher
            document.getElementById('basemap-select').addEventListener('change', function (e) {
                ['osm-layer','sat-layer','dark-layer'].forEach(id => {
                    map.setLayoutProperty(id, 'visibility', id === e.target.value ? 'visible' : 'none');
                });
            });
        });
    </script>
</body>
</html>
